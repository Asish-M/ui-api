# ─────────────────────────────────────────────────────────────
# Docker Compose — Selenium Grid + Test Runner
#
# Usage:
#   docker-compose up --build                  # run all tests
#   docker-compose up --build --scale chrome=3 # 3 Chrome nodes
#   docker-compose up -d selenium-hub chrome   # Grid only
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Selenium Hub ──────────────────────────────────────────
  selenium-hub:
    image: selenium/hub:4.27.0
    container_name: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    environment:
      - GRID_MAX_SESSION=10
      - SE_SESSION_REQUEST_TIMEOUT=300
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Chrome Node ───────────────────────────────────────────
  chrome:
    image: selenium/node-chrome:4.27.0
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    shm_size: "2gb"
    deploy:
      replicas: 2

  # ── Firefox Node ──────────────────────────────────────────
  firefox:
    image: selenium/node-firefox:4.27.0
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    shm_size: "2gb"
    deploy:
      replicas: 1

  # ── Edge Node ─────────────────────────────────────────────
  edge:
    image: selenium/node-edge:4.27.0
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    shm_size: "2gb"
    deploy:
      replicas: 1

  # ── Test Runner ───────────────────────────────────────────
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - BROWSER=chrome
      - HEADLESS=true
      - SELENIUM_GRID_URL=http://selenium-hub:4444/wd/hub
      - PARALLEL_THREAD_COUNT=3
      - ENVIRONMENT=dev
    volumes:
      - ./target:/app/target          # persist reports & screenshots
      - ./logs:/app/logs              # persist logs
