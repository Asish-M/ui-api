# ============================================================
# Automation Framework — Default Configuration
# ============================================================
# Override any value via system property:  -Dbrowser=firefox
# Override any value via env variable:     BROWSER=firefox
# ============================================================

# --- Browser ---
browser=chrome
headless=false

# --- Parallel ---
parallel.enabled=true
parallel.thread.count=3

# --- URLs ---
base.url=https://the-internet.herokuapp.com
api.base.url=https://reqres.in/api

# --- Timeouts (seconds) ---
implicit.wait=0
explicit.wait=15
page.load.timeout=30

# --- Environment ---
environment=dev

# --- Selenium Grid (leave empty for local execution) ---
selenium.grid.url=

# --- Screenshots ---
screenshot.on.failure=true
screenshot.dir=target/screenshots

# --- Retry ---
retry.count=1

# --- Self-Healing ---
self.healing.enabled=true
